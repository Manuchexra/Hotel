<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mehmon kirishi | HotelOS</title>
    <link rel="stylesheet" href="css/guest.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="guest-login-page">
    <div class="login-container">
        <div class="login-card">
            <h1><i class="fas fa-hotel"></i> HotelOS</h1>
            <h3>Mehmon kirishi</h3>
            <form id="guestLoginForm">
                <div class="input-group">
                    <label>Login</label>
                    <input type="text" id="login" placeholder="Masalan: guest_101" required>
                </div>
                <div class="input-group">
                    <label>Parol</label>
                    <input type="password" id="password" placeholder="Parol" required>
                </div>
                <button type="submit" id="submitBtn" class="btn-gold">Kirish</button>
                <div id="loader" style="display: none;"><i class="fas fa-spinner fa-spin"></i> Yuklanmoqda...</div>
                <div id="errorMessage" class="error-message" style="display: none;"></div>
                <div id="successMessage" class="success-message" style="display: none;"></div>
            </form>
            <div class="test-credentials">
                <p>Test hisobi: login <strong>guest_101</strong>, parol <strong>room101</strong></p>
                <p>(Reception sizga loginni beradi)</p>
            </div>
        </div>
    </div>
    <script src="guest-auth.js"></script>
</body>
</html>
